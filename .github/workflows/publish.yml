name: Сборка Tauri
on:
  push:
    tags:
      - 'v*' # Запускает сборку при создании тега (например, v1.0.0)

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Сборка для macOS
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04' # Сборка для Linux
            args: ''
          - platform: 'windows-latest' # Сборка для Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # или yarn / pnpm

      - name: Установка Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Установка зависимостей (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Установка зависимостей проекта
        run: npm install # или yarn install / pnpm install

      - name: Сборка приложения
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Релиз ${{ github.ref_name }}'
          args: ${{ matrix.args }}
